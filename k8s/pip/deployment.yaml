apiVersion: apps/v1
kind: Deployment
metadata:
  name: pip
  namespace: zerotrust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pip
  template:
    metadata:
      labels:
        app: pip
    spec:
      containers:
        - name: pip
          image: pip:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ABUSEIPDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zerotrust-secrets
                  key: abuseipdb-api-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pip
  namespace: zerotrust
spec:
  selector:
    app: pip
  ports:
    - port: 8002
      targetPort: 8002
