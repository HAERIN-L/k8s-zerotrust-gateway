apiVersion: apps/v1
kind: Deployment
metadata:
  name: upstream
  namespace: zerotrust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upstream
  template:
    metadata:
      labels:
        app: upstream
    spec:
      containers:
        - name: upstream
          image: upstream:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: upstream
  namespace: zerotrust
spec:
  selector:
    app: upstream
  ports:
    - port: 8080
      targetPort: 8080
