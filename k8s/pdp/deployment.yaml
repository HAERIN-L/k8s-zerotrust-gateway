apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdp
  namespace: zerotrust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pdp
  template:
    metadata:
      labels:
        app: pdp
    spec:
      containers:
        - name: pdp
          image: pdp:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pdp
  namespace: zerotrust
spec:
  selector:
    app: pdp
  ports:
    - port: 8001
      targetPort: 8001
